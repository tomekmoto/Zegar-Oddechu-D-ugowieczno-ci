<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Zegar oddechu PRO</title>
<style>
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:#111;overflow:hidden;}
body{display:flex;align-items:center;justify-content:center;}
.clock{width:min(100vw,100vh);height:min(100vw,100vh);position:relative;}
canvas{width:100%;height:100%;}
.center{
position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
width:30%;height:30%;border-radius:50%;
background:#111a;border:2px solid #fff6;
display:flex;align-items:center;justify-content:center;
font-size:18vmin;font-weight:800;
transition:transform 0.2s linear;
}
</style>
</head>
<body>
<div class="clock">
<canvas id="c"></canvas>
<div class="center" id="num">1</div>
</div>

<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
const num=document.getElementById('num');

const phases=[
{d:5,c1:'#16a34a',c2:'#4ade80',m:'up'},
{d:3,c1:'#dc2626',c2:'#f87171',m:'up'},
{d:7,c1:'#eab308',c2:'#fde047',m:'down'}
];

const cycle=15;
const total=60;
const start=performance.now();

function resize(){
const r=c.getBoundingClientRect();
const dpr=window.devicePixelRatio||1;
c.width=r.width*dpr;
c.height=r.height*dpr;
ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);
resize();

function phase(t){
t=((t%cycle)+cycle)%cycle;
let a=0;
for(const p of phases){
if(t<a+p.d){
let e=t-a;
let n=p.m==='down'
? Math.max(1,p.d-Math.floor(e))
: Math.min(p.d,Math.floor(e)+1);

let progress=e/p.d;
return {...p,n,progress};
}
a+=p.d;
}
return {...phases[0],n:1,progress:0};
}

function lerpColor(a,b,t){
const ah=parseInt(a.replace('#',''),16);
const bh=parseInt(b.replace('#',''),16);

const ar=(ah>>16)&255, ag=(ah>>8)&255, ab=ah&255;
const br=(bh>>16)&255, bg=(bh>>8)&255, bb=bh&255;

const rr=Math.round(ar+(br-ar)*t);
const rg=Math.round(ag+(bg-ag)*t);
const rb=Math.round(ab+(bb-ab)*t);

return `rgb(${rr},${rg},${rb})`;
}

function draw(){
let now=(performance.now()-start)/1000;
let w=c.clientWidth,h=c.clientHeight;
let cx=w/2,cy=h/2;
let r=Math.min(w,h)*0.5-2;
let startA=-Math.PI/2;

ctx.clearRect(0,0,w,h);

let steps=2000;
for(let i=0;i<steps;i++){
let s=i/steps*total;
let e=(i+1)/steps*total;
let p=phase(s);

let col=lerpColor(p.c1,p.c2,p.progress);

let a1=startA+(s/total)*Math.PI*2;
let a2=startA+(e/total)*Math.PI*2;

ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.arc(cx,cy,r,a1,a2);
ctx.closePath();
ctx.fillStyle=col;
ctx.fill();
}

// pointer
let pos=now%total;
let ang=startA+(pos/total)*Math.PI*2;

ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.lineTo(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);
ctx.strokeStyle='#fff';
ctx.lineWidth=4;
ctx.stroke();

// center number + pulse
let cur=phase(now);
num.textContent=cur.n;

let col=lerpColor(cur.c1,cur.c2,cur.progress);
num.style.color=col;

// pulse effect
let scale=1+0.08*Math.sin(now*3);
num.style.transform=`translate(-50%,-50%) scale(${scale})`;

requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
