<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Zegar oddechu CLEAN</title>
<style>
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:#111;overflow:hidden;}
body{display:flex;align-items:center;justify-content:center;}
.clock{width:min(100vw,100vh);height:min(100vw,100vh);position:relative;}
canvas{width:100%;height:100%;}
.center{
position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
width:30%;height:30%;border-radius:50%;
background:#111;border:2px solid #fff6;
display:flex;align-items:center;justify-content:center;
font-size:18vmin;font-weight:800;
}
</style>
</head>
<body>
<div class="clock">
<canvas id="c"></canvas>
<div class="center" id="num">1</div>
</div>

<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
const num=document.getElementById('num');

const cycle=15;
const total=60;
const start=performance.now();

const green=[34,197,94];
const red=[239,68,68];
const yellow=[250,204,21];

function resize(){
const r=c.getBoundingClientRect();
const dpr=window.devicePixelRatio||1;
c.width=r.width*dpr;
c.height=r.height*dpr;
ctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize',resize);
resize();

function mix(a,b,t){
return `rgb(${a[0]+(b[0]-a[0])*t},
             ${a[1]+(b[1]-a[1])*t},
             ${a[2]+(b[2]-a[2])*t})`;
}

function ease(t){return t*t*(3-2*t);}

function getColor(t){
t=t%cycle;
if(t<5){
let p=t/5;
return mix(green,red,ease(p*0.2));
}
if(t<8){
let p=(t-5)/3;
return mix(red,yellow,ease(p*0.5));
}
let p=(t-8)/7;
return mix(yellow,green,ease(p*0.2));
}

function getNumber(t){
t=t%cycle;
if(t<5) return Math.floor(t)+1;
if(t<8) return Math.floor(t-5)+1;
return 7-Math.floor(t-8);
}

function draw(){
let now=(performance.now()-start)/1000;
let w=c.clientWidth,h=c.clientHeight;
let cx=w/2,cy=h/2;
let r=Math.min(w,h)*0.5;
let startA=-Math.PI/2;

ctx.clearRect(0,0,w,h);

// KLUCZ: overlap (nakładanie się segmentów)
let steps=2000;
let overlap=0.002; // usuwa czarne szczeliny

for(let i=0;i<steps;i++){
let s=i/steps*total;
let e=(i+1)/steps*total;

let col=getColor(s);

let a1=startA+(s/total)*Math.PI*2 - overlap;
let a2=startA+(e/total)*Math.PI*2 + overlap;

ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.arc(cx,cy,r,a1,a2);
ctx.closePath();
ctx.fillStyle=col;
ctx.fill();
}

// pointer
let pos=now%total;
let ang=startA+(pos/total)*Math.PI*2;

ctx.beginPath();
ctx.moveTo(cx,cy);
ctx.lineTo(cx+Math.cos(ang)*r,cy+Math.sin(ang)*r);
ctx.strokeStyle='#fff';
ctx.lineWidth=4;
ctx.stroke();

// center
let col=getColor(now);
num.textContent=getNumber(now);
num.style.color=col;

requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
